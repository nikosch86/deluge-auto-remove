[tool.pylint.main]
ignore-paths = ["venv/.*"]

[tool.pylint."messages control"]
# Test-friendly: pytest fixtures legitimately shadow outer names; test
# functions are self-documenting via descriptive names.
disable = []

[tool.pylint.design]
max-returns = 10
max-branches = 15
max-locals = 20

[tool.pylint.format]
max-line-length = 110

[tool.pylint.basic]
good-names = ["e", "f", "i", "j", "k", "id", "exc", "_"]

[tool.ruff]
line-length = 110

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
